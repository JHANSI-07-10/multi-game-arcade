<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Tic-Tac-Toe | Nexus Gaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], gaming: ['Orbitron', 'sans-serif'] },
                    colors: {
                        dark: '#0a0a0c',
                        neon: { pink: '#ff00ff', blue: '#00f3ff', purple: '#b026ff' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0a0c; color: #fff; touch-action: manipulation; }
        .glass-panel { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(176, 38, 255, 0.2); }
        
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            background: rgba(176, 38, 255, 0.1);
            padding: 12px;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(176, 38, 255, 0.15);
        }

        .cell {
            aspect-ratio: 1;
            background: #050505;
            border: 2px solid rgba(176, 38, 255, 0.3);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }

        .cell:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(176, 38, 255, 0.8);
        }

        .cell.x { color: #ff00ff; text-shadow: 0 0 15px #ff00ff, 0 0 30px #ff00ff; }
        .cell.o { color: #00f3ff; text-shadow: 0 0 15px #00f3ff, 0 0 30px #00f3ff; }
        
        .winning-cell {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fff;
            transform: scale(1.05);
            z-index: 10;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md flex justify-between items-center mb-8">
        <a href="../games.html" class="text-gray-400 hover:text-white transition flex items-center gap-2 font-gaming text-sm">
            <i class="fa-solid fa-arrow-left"></i> Back
        </a>
        <h1 class="font-gaming text-2xl font-bold text-neon-purple tracking-widest text-shadow-purple">TIC-TAC-TOE</h1>
        <div class="w-16"></div> <!-- Spacer for centering -->
    </div>

    <div class="text-center mb-6 h-8">
        <p id="statusText" class="font-gaming text-xl text-white tracking-widest">PLAYER (X) TURN</p>
    </div>

    <div class="relative w-full max-w-md">
        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <!-- Start/Game Over Modal -->
        <div id="gameModal" class="absolute inset-0 glass-panel flex flex-col items-center justify-center z-10 rounded-2xl hidden">
            <h2 id="modalTitle" class="text-4xl font-gaming font-bold mb-2"></h2>
            <p id="modalSubtitle" class="text-gray-400 mb-8"></p>
            <div class="flex gap-4">
                <button onclick="startGame('PvAI')" class="px-6 py-3 bg-neon-purple/20 border border-neon-purple text-white font-gaming rounded-lg hover:bg-neon-purple hover:text-black transition-all">
                    PLAY A.I.
                </button>
                <button onclick="startGame('PvP')" class="px-6 py-3 bg-transparent border border-gray-600 text-gray-300 font-gaming rounded-lg hover:bg-gray-800 transition-all">
                    LOCAL PvP
                </button>
            </div>
        </div>
    </div>

    <script>
        const boardElement = document.getElementById('board');
        const cells = document.querySelectorAll('.cell');
        const statusText = document.getElementById('statusText');
        const gameModal = document.getElementById('gameModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalSubtitle = document.getElementById('modalSubtitle');

        let board = ['', '', '', '', '', '', '', '', ''];
        let currentPlayer = 'X'; // X always starts
        let gameActive = false;
        let gameMode = 'PvAI'; // PvAI or PvP

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Cols
            [0, 4, 8], [2, 4, 6]             // Diagonals
        ];

        // Initialize Screen
        showModal('SYSTEM READY', 'Select game mode to initialize');

        function showModal(title, subtitle, isWin = false, winner = null) {
            modalTitle.innerText = title;
            modalSubtitle.innerText = subtitle;
            
            if(isWin) {
                if(winner === 'X') modalTitle.className = "text-4xl font-gaming font-bold mb-2 text-neon-pink drop-shadow-[0_0_10px_rgba(255,0,255,0.8)]";
                else if(winner === 'O') modalTitle.className = "text-4xl font-gaming font-bold mb-2 text-neon-blue drop-shadow-[0_0_10px_rgba(0,243,255,0.8)]";
                else modalTitle.className = "text-4xl font-gaming font-bold mb-2 text-white";
            } else {
                modalTitle.className = "text-4xl font-gaming font-bold mb-2 text-neon-purple";
            }
            
            gameModal.classList.remove('hidden');
        }

        function startGame(mode) {
            gameMode = mode;
            board = ['', '', '', '', '', '', '', '', ''];
            currentPlayer = 'X';
            gameActive = true;
            
            cells.forEach(cell => {
                cell.innerText = '';
                cell.classList.remove('x', 'o', 'winning-cell');
            });
            
            gameModal.classList.add('hidden');
            updateStatusText();
        }

        function updateStatusText() {
            if(currentPlayer === 'X') {
                statusText.innerHTML = 'PLAYER <span class="text-neon-pink">X</span> TURN';
            } else {
                statusText.innerHTML = gameMode === 'PvAI' ? 'A.I. <span class="text-neon-blue">O</span> COMPUTING...' : 'PLAYER <span class="text-neon-blue">O</span> TURN';
            }
        }

        // Handle Player Clicks
        cells.forEach(cell => {
            cell.addEventListener('click', () => handleCellClick(cell));
        });

        function handleCellClick(cell) {
            const index = cell.getAttribute('data-index');
            
            if (board[index] !== '' || !gameActive) return;
            if (gameMode === 'PvAI' && currentPlayer === 'O') return; // Prevent clicking during AI turn

            makeMove(index, currentPlayer);
            checkWin();

            if (gameActive && gameMode === 'PvAI' && currentPlayer === 'O') {
                setTimeout(makeAIMove, 500); // Small delay for realism
            }
        }

        function makeMove(index, player) {
            board[index] = player;
            cells[index].innerText = player;
            cells[index].classList.add(player.toLowerCase());
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            updateStatusText();
        }

        function makeAIMove() {
            if (!gameActive) return;

            // 1. Check if AI can win
            let move = findBestMove('O');
            
            // 2. Check if AI needs to block Player X
            if (move === -1) move = findBestMove('X');
            
            // 3. Take center if available
            if (move === -1 && board[4] === '') move = 4;
            
            // 4. Take random available spot
            if (move === -1) {
                let available = board.map((val, idx) => val === '' ? idx : null).filter(val => val !== null);
                if(available.length > 0) {
                    move = available[Math.floor(Math.random() * available.length)];
                }
            }

            if (move !== -1) {
                makeMove(move, 'O');
                checkWin();
            }
        }

        function findBestMove(player) {
            for (let i = 0; i < winningConditions.length; i++) {
                const [a, b, c] = winningConditions[i];
                if (board[a] === player && board[b] === player && board[c] === '') return c;
                if (board[a] === player && board[c] === player && board[b] === '') return b;
                if (board[b] === player && board[c] === player && board[a] === '') return a;
            }
            return -1;
        }

        function checkWin() {
            let roundWon = false;
            let winningLine = [];

            for (let i = 0; i < winningConditions.length; i++) {
                const [a, b, c] = winningConditions[i];
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    roundWon = true;
                    winningLine = [a, b, c];
                    break;
                }
            }

            if (roundWon) {
                const winner = board[winningLine[0]];
                winningLine.forEach(index => cells[index].classList.add('winning-cell'));
                gameActive = false;
                
                setTimeout(() => {
                    let title = winner === 'X' ? 'PLAYER X WINS' : (gameMode === 'PvAI' ? 'A.I. DOMINATION' : 'PLAYER O WINS');
                    showModal(title, 'Sequence Complete', true, winner);
                }, 800);
                return;
            }

            if (!board.includes('')) {
                gameActive = false;
                setTimeout(() => showModal('DRAW', 'Grid Locked', true, 'DRAW'), 800);
            }
        }
    </script>
</body>
</html>

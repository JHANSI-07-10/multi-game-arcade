<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Runner | Nexus Gaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], gaming: ['Orbitron', 'sans-serif'] },
                    colors: {
                        dark: '#0a0a0c',
                        neon: { orange: '#ff5e00', purple: '#b026ff', blue: '#00f3ff', red: '#ff2a2a' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0a0c; color: #fff; touch-action: none; overflow: hidden; }
        .glass-panel { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px); border: 1px solid rgba(255, 94, 0, 0.3); }
        .canvas-container {
            position: relative; width: 100%; max-width: 400px; margin: 0 auto;
            aspect-ratio: 2/3;
        }
        #gameCanvas { 
            background-color: #050505; width: 100%; height: 100%; display: block;
            border: 2px solid #ff5e00; border-radius: 8px;
            box-shadow: 0 0 20px rgba(255, 94, 0, 0.2), inset 0 0 30px rgba(255, 94, 0, 0.05);
        }
        /* Mobile Touch overlays - splitting screen in half for easy tapping */
        .touch-left { position: absolute; left: 0; top: 0; width: 50%; height: 100%; z-index: 5; pointer-events: none;}
        .touch-right { position: absolute; right: 0; top: 0; width: 50%; height: 100%; z-index: 5; pointer-events: none;}
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center px-4 py-6">

    <div class="w-full max-w-md mx-auto flex justify-between items-end mb-4">
        <a href="../../games.html" class="text-gray-400 hover:text-white transition flex items-center gap-2 font-gaming text-sm z-20 relative">
            <i class="fa-solid fa-arrow-left"></i> Back
        </a>
        <h1 class="font-gaming text-2xl font-bold text-neon-orange tracking-widest text-shadow-orange text-center absolute left-0 right-0 pointer-events-none">CYBER RUNNER</h1>
        <div class="text-right font-gaming z-20 relative">
            <p class="text-xs text-gray-400">DATA</p>
            <p id="scoreDisplay" class="text-2xl text-white font-bold leading-none">0</p>
        </div>
    </div>

    <div class="canvas-container shadow-2xl relative">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        
        <div class="touch-left" id="btn-left"></div>
        <div class="touch-right" id="btn-right"></div>

        <!-- Start Screen -->
        <div id="startModal" class="absolute inset-0 glass-panel flex flex-col items-center justify-center z-10 rounded-lg">
            <i class="fa-solid fa-rocket text-5xl text-neon-orange mb-6"></i>
            <h2 class="text-3xl font-gaming font-bold text-white mb-8 text-center px-4">INITIALIZE RUN</h2>
            <button onclick="startGame()" class="px-8 py-3 bg-neon-orange text-black font-gaming font-bold rounded hover:bg-white transition shadow-[0_0_15px_rgba(255,94,0,0.6)] relative z-20">
                ENGAGE
            </button>
            <p class="text-gray-400 text-sm mt-6 text-center px-6">Controls: A/D or Arrow Keys.<br>Mobile: Tap Left/Right side of screen.</p>
        </div>

        <!-- Game Over Screen -->
        <div id="gameOverModal" class="hidden absolute inset-0 glass-panel flex flex-col items-center justify-center z-10 rounded-lg">
            <h2 class="text-4xl font-gaming font-bold text-neon-red mb-2 drop-shadow-[0_0_10px_rgba(255,42,42,0.8)]">CRASHED</h2>
            <p class="text-gray-300 mb-1">Data Collected</p>
            <p id="finalScore" class="text-4xl font-gaming text-neon-blue font-bold mb-8">0</p>
            <button onclick="resetGame()" class="px-6 py-3 bg-transparent border-2 border-neon-orange text-neon-orange font-gaming rounded hover:bg-neon-orange hover:text-black transition relative z-20">
                <i class="fa-solid fa-rotate-right mr-2"></i> RETRY
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("scoreDisplay");
        const startModal = document.getElementById("startModal");
        const gameOverModal = document.getElementById("gameOverModal");
        const finalScore = document.getElementById("finalScore");

        // Game Environment
        const lanes = [canvas.width * 0.2, canvas.width * 0.5, canvas.width * 0.8]; // X centers of 3 lanes
        let laneWidth = canvas.width * 0.3;
        let isPlaying = false;
        let animationId;
        
        // Game State
        let baseSpeed = 5;
        let speed = baseSpeed;
        let score = 0;
        let frameCount = 0;
        let obstacles = [];
        let particles = [];

        // Player
        const player = {
            lane: 1, // Start in middle lane (0, 1, 2)
            y: canvas.height - 80,
            width: 30,
            height: 50,
            color: '#00f3ff', // Neon Blue
            targetX: lanes[1],
            x: lanes[1]
        };

        function resetVars() {
            player.lane = 1;
            player.x = lanes[1];
            player.targetX = lanes[1];
            speed = baseSpeed;
            score = 0;
            frameCount = 0;
            obstacles = [];
            particles = [];
            scoreDisplay.innerText = "0";
        }

        // Object Creators
        function spawnObstacle() {
            // Randomly decide if spawning coin or block
            const isCoin = Math.random() > 0.7; 
            const laneIndex = Math.floor(Math.random() * 3);
            
            obstacles.push({
                x: lanes[laneIndex],
                y: -50,
                width: isCoin ? 20 : 40,
                height: isCoin ? 20 : 40,
                type: isCoin ? 'coin' : 'wall',
                color: isCoin ? '#b026ff' : '#ff2a2a', // Purple coin, Red wall
                lane: laneIndex
            });
        }

        function createParticles(x, y, color) {
            for(let i=0; i<10; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1.0, color: color
                });
            }
        }

        function update() {
            if(!isPlaying) return;
            frameCount++;

            // Increase difficulty
            if(frameCount % 600 === 0) speed += 0.5;

            // Spawn entities
            if(frameCount % Math.max(30, Math.floor(100 - speed * 3)) === 0) {
                spawnObstacle();
            }

            // Smooth player movement between lanes
            player.targetX = lanes[player.lane];
            player.x += (player.targetX - player.x) * 0.3; // LERP for smooth glide

            // Update obstacles
            for(let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.y += speed;

                // Collision Detection
                // Calculate bounding boxes (centered on X)
                let pLeft = player.x - player.width/2;
                let pRight = player.x + player.width/2;
                let oLeft = obs.x - obs.width/2;
                let oRight = obs.x + obs.width/2;

                if (pLeft < oRight && pRight > oLeft && 
                    player.y < obs.y + obs.height && player.y + player.height > obs.y) {
                    
                    if(obs.type === 'coin') {
                        score += 100;
                        scoreDisplay.innerText = score;
                        createParticles(obs.x, obs.y, obs.color);
                        obstacles.splice(i, 1);
                    } else if (obs.type === 'wall') {
                        gameOver();
                        return;
                    }
                }

                // Remove off-screen obstacles
                if(obs.y > canvas.height) {
                    obstacles.splice(i, 1);
                    score += 10; // Passive score for surviving
                    scoreDisplay.innerText = score;
                }
            }

            // Update Particles
            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.life -= 0.05;
                if(p.life <= 0) particles.splice(i, 1);
            }
        }

        function draw() {
            // Background
            ctx.fillStyle = "#050505";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Lanes (Grid effect)
            ctx.strokeStyle = "rgba(255, 94, 0, 0.1)";
            ctx.lineWidth = 2;
            
            // Vertical lane dividers
            ctx.beginPath(); ctx.moveTo(canvas.width * 0.35, 0); ctx.lineTo(canvas.width * 0.35, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(canvas.width * 0.65, 0); ctx.lineTo(canvas.width * 0.65, canvas.height); ctx.stroke();

            // Moving horizontal grid lines to simulate speed
            let offset = (frameCount * speed) % 100;
            for(let i = offset - 100; i < canvas.height; i += 100) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            // Draw Obstacles
            obstacles.forEach(obs => {
                ctx.fillStyle = obs.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = obs.color;
                
                if(obs.type === 'coin') {
                    ctx.beginPath();
                    ctx.arc(obs.x, obs.y, obs.width/2, 0, Math.PI*2);
                    ctx.fill();
                    // Inner glow
                    ctx.fillStyle = "#fff"; ctx.shadowBlur = 0;
                    ctx.beginPath(); ctx.arc(obs.x, obs.y, obs.width/4, 0, Math.PI*2); ctx.fill();
                } else {
                    ctx.fillRect(obs.x - obs.width/2, obs.y, obs.width, obs.height);
                }
            });

            // Draw Player (Cyber Hoverboard shape)
            ctx.shadowBlur = 20;
            ctx.shadowColor = player.color;
            ctx.fillStyle = player.color;
            
            ctx.beginPath();
            ctx.moveTo(player.x, player.y); // Top point
            ctx.lineTo(player.x + player.width/2, player.y + player.height); // Bottom right
            ctx.lineTo(player.x - player.width/2, player.y + player.height); // Bottom left
            ctx.closePath();
            ctx.fill();

            // Engine trail
            ctx.fillStyle = "#fff";
            ctx.shadowColor = "#fff";
            ctx.globalAlpha = 0.5 + Math.sin(frameCount * 0.5) * 0.5; // Flicker effect
            ctx.fillRect(player.x - 5, player.y + player.height, 10, 15);
            ctx.globalAlpha = 1.0;

            // Draw Particles
            ctx.shadowBlur = 10;
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
            });
            ctx.globalAlpha = 1.0;
            ctx.shadowBlur = 0;
        }

        function gameLoop() {
            update();
            draw();
            if(isPlaying) {
                animationId = requestAnimationFrame(gameLoop);
            }
        }

        function moveLeft() {
            if(!isPlaying) return;
            if(player.lane > 0) player.lane--;
        }
        function moveRight() {
            if(!isPlaying) return;
            if(player.lane < 2) player.lane++;
        }

        // Keyboard
        window.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') moveLeft();
            if(e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') moveRight();
        });

        // Touch Areas (Mobile)
        document.getElementById('btn-left').addEventListener('touchstart', (e) => { e.preventDefault(); moveLeft(); });
        document.getElementById('btn-left').addEventListener('mousedown', moveLeft);
        
        document.getElementById('btn-right').addEventListener('touchstart', (e) => { e.preventDefault(); moveRight(); });
        document.getElementById('btn-right').addEventListener('mousedown', moveRight);

        function startGame() {
            startModal.classList.add('hidden');
            gameOverModal.classList.add('hidden');
            resetVars();
            isPlaying = true;
            gameLoop();
        }

        function gameOver() {
            isPlaying = false;
            finalScore.innerText = score;
            createParticles(player.x, player.y + player.height/2, player.color); // Explosion effect on death
            draw(); // Draw final explosion frame
            setTimeout(() => {
                gameOverModal.classList.remove('hidden');
            }, 500);
        }

        function resetGame() {
            startGame();
        }

        // Initial draw
        draw();

    </script>
</body>
</html>

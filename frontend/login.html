<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-black flex items-center justify-center h-screen">

    <div class="bg-gray-900 p-8 rounded-xl w-96">

        <h1 class="text-white text-3xl font-bold mb-6 text-center">
            Login
        </h1>

        <input
            type="email"
            id="email"
            placeholder="Email"
            class="w-full p-3 mb-4 rounded bg-gray-800 text-white"
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
            class="w-full p-3 mb-4 rounded bg-gray-800 text-white"
        >

        <button
            onclick="login()"
            class="w-full bg-cyan-500 hover:bg-cyan-600 text-white p-3 rounded"
        >
            Login
        </button>

        <p class="text-gray-400 mt-4 text-center">
            Don't have account?
            <a href="register.html" class="text-cyan-400">
                Register
            </a>
        </p>

    </div>

<script>

async function login() {

    const email = document.getElementById("email").value;

    const password = document.getElementById("password").value;

    try {

        const response = await fetch(
            "https://multi-game-arcade.onrender.com/api/auth/login",
            {

                method: "POST",

                headers: {

                    "Content-Type": "application/json"

                },

                body: JSON.stringify({

                    email,
                    password

                })

            }
        );

        const data = await response.json();

        if (data.token) {

            localStorage.setItem("token", data.token);

            localStorage.setItem("username", data.username);

            alert("Login Successful");

            window.location.href = "index.html";

        } else {

            alert(data.message);

        }

    } catch (error) {

        console.log(error);

    }

}

</script>

</body>
</html>

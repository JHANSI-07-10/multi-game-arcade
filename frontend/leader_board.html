<!DOCTYPE html>
<html lang="en" class="scroll-smooth dark" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Nexus Gaming | Global Leaderboards</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Rajdhani', 'sans-serif'],
                        gaming: ['Orbitron', 'sans-serif'],
                    },
                    colors: {
                        dark: '#07070f',
                        darker: '#03030a',
                        neon: {
                            purple: '#b026ff',
                            blue: '#00f3ff',
                            pink: '#ff00ff',
                        }
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="assets/css/leader_board.css">

</head>

<body class="min-h-screen font-sans antialiased pb-16 bg-[#03030a] text-white">

    <!-- NAVBAR -->
    <nav id="navbar"
        class="sticky top-0 z-50 w-full transition-all duration-300 border-b border-white/5 bg-[#03030a]/80 backdrop-blur-md">

        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

            <div class="flex items-center justify-between h-20">

                <div class="flex items-center gap-3">

                    <a href="index.html" class="flex items-center gap-3 group">

                        <div
                            class="w-10 h-10 rounded-xl bg-gradient-to-tr from-neon-purple to-neon-blue p-[1px] shadow-[0_0_15px_rgba(176,38,255,0.4)]">

                            <div class="w-full h-full bg-darker rounded-xl flex items-center justify-center">

                                <i
                                    class="fa-solid fa-gamepad text-sm text-neon-blue group-hover:rotate-12 transition-transform"></i>

                            </div>

                        </div>

                        <span
                            class="font-gaming font-black text-xl tracking-wider uppercase bg-clip-text text-transparent bg-gradient-to-r from-white via-white to-neon-blue">

                            Nexus<span class="text-neon-purple">Gaming</span>

                        </span>

                    </a>

                </div>

                <div class="hidden md:flex items-baseline space-x-8">

                    <a href="index.html"
                        class="font-gaming px-3 py-2 text-sm font-medium text-gray-400 hover:text-neon-purple transition-colors">
                        Home
                    </a>

                    <a href="games.html"
                        class="font-gaming px-3 py-2 text-sm font-medium text-gray-400 hover:text-neon-purple transition-colors">
                        Games
                    </a>

                    <a href="leader_board.html"
                        class="font-gaming px-3 py-2 text-sm font-medium text-neon-blue border-b border-neon-blue">
                        🏆 Leaderboard
                    </a>

                </div>

            </div>

        </div>

    </nav>

    <!-- HEADER -->
    <header class="max-w-7xl mx-auto px-4 pt-16 text-center">

        <h1 class="font-gaming font-black text-4xl md:text-5xl tracking-tight uppercase mb-4">

            Leaderboard

            <span class="bg-clip-text text-transparent bg-gradient-to-r from-neon-purple to-neon-blue">
                Matrix
            </span>

        </h1>

        <p
            class="text-gray-400 font-medium max-w-xl mx-auto text-base md:text-lg tracking-wide uppercase font-gaming text-xs text-neon-blue neon-text-glow">

             LIVE ARCADE TERMINAL CHRONICLES

        </p>

    </header>

    <!-- DYNAMIC LEADERBOARD -->
    <main id="matrix-grid"
        class="max-w-7xl mx-auto px-4 mt-8 grid grid-cols-1 md:grid-cols-2 gap-8">

    </main>

    <!-- FOOTER -->
    <footer
        class="text-center mt-20 text-gray-600 font-gaming text-[10px] tracking-widest uppercase">

        &copy; 2026 NEXUS GAMING SYSTEM. ALL LOGS SECURED REVOLUTION ONLINE.

    </footer>

    <script src="assets/js/leader_board.js"></script>
    <script src="assets/js/auth.js"></script>

</body>

</html>
